apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "searchruler.fullname" . }}-manager
  labels:
    {{- include "searchruler.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - events
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - events.k8s.io
  resources:
  - events
  verbs:
  - create
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - searchruler.freepik.com
  resources:
  - queryconnectors
  - ruleractions
  - searchrules
  - clusterqueryconnectors
  - clusterruleractions
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - searchruler.freepik.com
  resources:
  - queryconnectors/finalizers
  - ruleractions/finalizers
  - searchrules/finalizers
  - clusterqueryconnectors/finalizers
  - clusterruleractions/finalizers
  verbs:
  - update
- apiGroups:
  - searchruler.freepik.com
  resources:
  - queryconnectors/status
  - ruleractions/status
  - searchrules/status
  - clusterqueryconnectors/status
  - clusterruleractions/status
  verbs:
  - get
  - patch
  - update
# Optional: permissions to manage PrometheusRule resources owned by SearchRules.
# These are only used when the prometheus-operator CRDs are installed in the
# cluster and a SearchRule opts into spec.prometheusRule. They are listed here
# because the controller still attempts to discover the CRD on every reconcile
# even when no SearchRule currently uses the feature.
- apiGroups:
  - monitoring.coreos.com
  resources:
  - prometheusrules
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch