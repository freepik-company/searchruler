              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: SearchRuleSpec defines the desired state of SearchRule.
            properties:
              actionRef:
                description: ActionRef TODO
                properties:
                  annotations:
                    additionalProperties:
                      type: string
                    type: object
                  data:
                    type: string
                  labels:
                    additionalProperties:
                      type: string
                    type: object
                  mode:
                    type: string
                  name:
                    type: string
                  namespace:
                    type: string
                required:
                - name
                type: object
              checkInterval:
                type: string
              condition:
                description: Condition TODO
                properties:
                  for:
                    type: string
                  operator:
                    type: string
                  threshold:
                    type: string
                required:
                - for
                - operator
                - threshold
                type: object
              customMetrics:
                description: |-
                  CustomMetrics declares Prometheus gauges derived from the
                  Elasticsearch response aggregations. Each entry produces one
                  `searchrule_<Name>` metric with one sample per bucket of the
                  referenced aggregation. Useful when a SearchRule's condition is built
                  on top of a `max_bucket`/`min_bucket` aggregation and the alert needs
                  to expose the dimension that the bucket grouped by.
                items:
                  description: |-
                    CustomMetric exposes a Prometheus gauge derived from a list of buckets in
                    the Elasticsearch response. The operator iterates AggregationMap (a gjson
                    path to an array — typically a `terms` aggregation's `buckets`) and emits
                    one sample per bucket with Labels mapped from the bucket fields and the
                    numeric Value extracted from another path within the bucket. The metric
                    is registered as `searchrule_<Name>` and always carries the additional
                    labels `searchrule_namespace` and `rule` so multiple SearchRules can share
                    the same custom metric name without collision.
                  properties:
                    aggregation_map:
                      description: |-
                        AggregationMap is a gjson path to an array of buckets, evaluated
                        against the contents of the Elasticsearch response's top-level
                        `aggregations` block (NOT the full response). For a query whose
                        response is `{"aggregations": {"by_domain": {"buckets": [...]}}}`
                        the right value is `by_domain.buckets`. If the path resolves to a
                        single object instead of an array, the operator emits a single
                        sample.
                      type: string
                    help:
                      description: Help is the Prometheus HELP text. Defaults to a
                        generic description.
                      type: string
                    labels:
                      description: Labels are extracted from each bucket and attached
                        to the sample.
                      items:
                        description: |-
                          MetricLabel describes how to extract a single Prometheus label from each
                          bucket emitted by a CustomMetric. Value is a gjson path resolved against
                          the bucket object (e.g. `key`, `error_percentage.value`). When StaticValue
                          is true, Value is emitted verbatim instead of being treated as a path —
                          useful for tagging every sample of a metric with a constant label.
                        properties:
                          name:
                            type: string
                          staticValue:
                            type: boolean
                          value:
                            type: string
                        required:
                        - name
                        - value
                        type: object
                      type: array
                    name:
                      description: |-
                        Name is the suffix of the Prometheus metric name. The exposed metric
                        is `searchrule_<Name>`. Must match `[a-zA-Z_][a-zA-Z_0-9]*` and must
                        not collide with the operator's reserved names (`value`, `state`).
                      pattern: ^[a-zA-Z_][a-zA-Z_0-9]*$
                      type: string
                    value:
                      description: |-
                        Value is the gjson path inside a bucket whose numeric content is
                        emitted as the gauge value. Defaults to `doc_count` when empty so a
                        bare `terms` aggregation works without configuration; for pipeline
                        aggregations such as `max_bucket` or `bucket_script`, set this
                        explicitly to e.g. `error_percentage.value` or `value`.
                      type: string
                  required:
                  - aggregation_map
                  - name
                  type: object
                maxItems: 10
                type: array
              description:
                type: string
              elasticsearch:
                description: Elasticsearch TODO
                properties:
                  conditionField:
                    type: string
                  index:
                    type: string
                  query:
                    x-kubernetes-preserve-unknown-fields: true
                  queryJSON:
                    type: string
                required:
                - conditionField
                - index
                type: object
              prometheusRule:
                description: |-
                  PrometheusRuleSpec configures the auto-generated PrometheusRule (CRD from
                  the prometheus-operator project) that mirrors this SearchRule's condition
                  against the searchrule_value metric exposed by the operator. When enabled,
                  a PrometheusRule resource is created in the same namespace as the
                  SearchRule, owned by it (so it is garbage-collected on deletion), and the
                  Prometheus Operator picks it up automatically.
                properties:
                  alertName:
                    description: |-
                      AlertName overrides the alert name in the generated PrometheusRule.
                      Defaults to the SearchRule name.
                    type: string
                  annotations:
                    additionalProperties:
                      type: string
                    description: Annotations are merged into the alert annotations.
                    type: object
                  enabled:
                    description: Enabled toggles the creation of the PrometheusRule
                      for this SearchRule.
                    type: boolean
                  labels:
                    additionalProperties:
                      type: string
                    description: Labels are merged into the alert labels.
                    type: object
                  metricName:
                    description: |-
                      MetricName selects which entry of spec.customMetrics the generated
                      PromQL targets when the SearchRule defines more than one. Must match
                      one of customMetrics[*].name. When unset, the first custom metric is
                      used. Ignored when customMetrics is empty (the legacy
                      `searchrule_value` metric is used instead).
                    type: string
                required:
                - enabled
                type: object
              queryConnectorRef:
                description: QueryConnectorRef TODO
                properties:
                  name:
                    type: string
                  namespace:
                    type: string
                required:
                - name
                type: object
            required:
            - checkInterval
            - condition
            - elasticsearch
            - queryConnectorRef
            type: object
          status:
            description: SearchRuleStatus defines the observed state of SearchRule.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
            required:
            - conditions
            type: object
        type: object
    served: true
